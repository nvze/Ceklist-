<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Executive Tracker</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --bg-color: #f1f5f9;
            --card-bg: #ffffff;
            --primary-text: #0f172a;
            --secondary-text: #64748b;
            --accent-color: #2563eb;
            --border-color: #e2e8f0;
            --shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
        }

        * { box-sizing: border-box; }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-color);
            color: var(--primary-text);
            margin: 0;
            padding: 15px;
            height: 100dvh;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .container {
            width: 100%;
            max-width: 1000px;
            height: 100%;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .top-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 5px;
        }

        .nav-link {
            display: flex;
            align-items: center;
            gap: 6px;
            color: var(--secondary-text);
            text-decoration: none;
            font-weight: 600;
            font-size: 14px;
            transition: color 0.2s;
        }

        .nav-link:hover { color: var(--primary-text); }

        .badge-day {
            background-color: var(--primary-text);
            color: white;
            padding: 6px 14px;
            border-radius: 20px;
            font-size: 13px;
            font-weight: 600;
            letter-spacing: 0.5px;
        }

        .card {
            background: var(--card-bg);
            border-radius: 12px;
            padding: 15px 20px;
            box-shadow: var(--shadow);
            border: 1px solid var(--border-color);
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 15px;
        }

        .btn-check {
            background-color: var(--card-bg);
            border: 2px solid var(--border-color);
            color: var(--secondary-text);
            padding: 12px;
            border-radius: 10px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 600;
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            user-select: none;
        }

        .btn-check:hover {
            border-color: var(--accent-color);
            transform: translateY(-2px);
        }

        .btn-check.active {
            background-color: var(--primary-text);
            color: white;
            border-color: var(--primary-text);
        }

        .btn-check .icon { font-size: 18px; }

        .chart-card {
            flex: 1;
            display: flex;
            flex-direction: column;
            min-height: 0;
        }

        .chart-title {
            font-size: 14px;
            font-weight: 600;
            margin-bottom: 10px;
            color: var(--secondary-text);
        }

        .chart-container {
            flex: 1;
            position: relative;
            width: 100%;
            min-height: 0;
        }

        .data-controls {
            display: flex;
            justify-content: flex-end;
            gap: 12px;
        }

        .btn-action {
            padding: 10px 20px;
            font-family: 'Inter', sans-serif;
            font-size: 13px;
            font-weight: 600;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s;
            border: none;
        }

        .btn-export { background-color: var(--primary-text); color: white; }
        .btn-export:hover { background-color: #1e293b; }
        .btn-import { background-color: transparent; color: var(--primary-text); border: 1px solid var(--border-color); }
        .btn-import:hover { background-color: #f8fafc; }

        @media (max-width: 600px) {
            .grid { grid-template-columns: repeat(2, 1fr); gap: 10px; }
            .btn-check { flex-direction: column; padding: 10px; font-size: 12px; text-align: center; }
            .btn-check .icon { margin-bottom: 4px; }
            .data-controls { justify-content: space-between; }
            .btn-action { width: 48%; justify-content: center; padding: 10px 0; }
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="top-bar">
            <a href="https://nvze.github.io/dashboard/index.html" class="nav-link">
                <span>←</span> Kembali
            </a>
            <span class="badge-day" id="dayCounter">Hari ke-1</span>
        </div>

        <div class="card">
            <div class="grid">
                <div class="btn-check" id="btn-wajib" onclick="toggleTask('bacaWajib')">
                    <span class="icon">📚</span><span>Baca Wajib</span>
                </div>
                <div class="btn-check" id="btn-ringan" onclick="toggleTask('bacaRingan')">
                    <span class="icon">📖</span><span>Baca Ringan</span>
                </div>
                <div class="btn-check" id="btn-dampak" onclick="toggleTask('tindakanBerdampak')">
                    <span class="icon">⚡</span><span>Berdampak</span>
                </div>
                <div class="btn-check" id="btn-warming" onclick="toggleTask('warmingUp')">
                    <span class="icon">🧘‍♂️</span><span>Warming Up</span>
                </div>
            </div>
        </div>

        <div class="card chart-card">
            <div class="chart-title">Metrik Konsistensi (%)</div>
            <div class="chart-container">
                <canvas id="progressChart"></canvas>
            </div>
        </div>

        <div class="card">
            <div class="data-controls">
                <input type="file" id="importFile" style="display: none;" accept=".json" onchange="importData(event)">
                <button class="btn-action btn-import" onclick="document.getElementById('importFile').click()">
                    ↑ Import Data
                </button>
                <button class="btn-action btn-export" onclick="exportData()">
                    ↓ Export Data
                </button>
            </div>
        </div>
    </div>

    <script>
        const tasks = ['bacaWajib', 'bacaRingan', 'tindakanBerdampak', 'warmingUp'];
        const taskLabels = ['Baca Wajib', 'Baca Ringan', 'Berdampak', 'Warming Up'];
        let chartInstance = null;

        // FUNGSI BARU: Mengambil tanggal berdasarkan Waktu Lokal (Tepat ganti jam 00:00)
        function getTodayDate() {
            const today = new Date();
            const year = today.getFullYear();
            const month = String(today.getMonth() + 1).padStart(2, '0');
            const day = String(today.getDate()).padStart(2, '0');
            return `${year}-${month}-${day}`;
        }

        function initData() {
            let data = JSON.parse(localStorage.getItem('executiveTrackerData'));
            if (!data) {
                data = { startDate: getTodayDate(), history: {} };
            }
            const today = getTodayDate();
            if (!data.history[today]) {
                data.history[today] = { bacaWajib: false, bacaRingan: false, tindakanBerdampak: false, warmingUp: false };
            }
            localStorage.setItem('executiveTrackerData', JSON.stringify(data));
            return data;
        }

        // FUNGSI BARU: Menghitung selisih hari direset tepat pada tengah malam (jam 00:00:00)
        function calculateTotalDays(startDate) {
            const startParts = startDate.split('-');
            // Set jam ke 00:00:00 waktu lokal
            const start = new Date(startParts[0], startParts[1] - 1, startParts[2], 0, 0, 0);
            
            const todayDate = getTodayDate();
            const todayParts = todayDate.split('-');
            // Set jam ke 00:00:00 waktu lokal
            const today = new Date(todayParts[0], todayParts[1] - 1, todayParts[2], 0, 0, 0);

            const diffTime = today.getTime() - start.getTime();
            const diffDays = Math.round(diffTime / (1000 * 60 * 60 * 24)); 
            return diffDays + 1;
        }

        function updateUI() {
            const data = initData();
            const today = getTodayDate();
            const todayData = data.history[today];
            const totalDays = calculateTotalDays(data.startDate);

            document.getElementById('dayCounter').innerText = `Hari ke-${totalDays}`;

            tasks.forEach((task, index) => {
                const btnId = ['btn-wajib', 'btn-ringan', 'btn-dampak', 'btn-warming'][index];
                const btn = document.getElementById(btnId);
                if (todayData[task]) {
                    btn.classList.add('active');
                } else {
                    btn.classList.remove('active');
                }
            });

            updateChart(data, totalDays);
        }

        function toggleTask(taskName) {
            const data = initData();
            const today = getTodayDate();
            data.history[today][taskName] = !data.history[today][taskName];
            localStorage.setItem('executiveTrackerData', JSON.stringify(data));
            updateUI();
        }

        function updateChart(data, totalDays) {
            let completionCounts = { bacaWajib: 0, bacaRingan: 0, tindakanBerdampak: 0, warmingUp: 0 };
            
            for (const date in data.history) {
                tasks.forEach(task => {
                    if (data.history[date][task]) completionCounts[task]++;
                });
            }

            const percentages = tasks.map(task => {
                return ((completionCounts[task] / totalDays) * 100).toFixed(1);
            });

            const ctx = document.getElementById('progressChart').getContext('2d');
            
            if (chartInstance) {
                chartInstance.destroy();
            }

            Chart.defaults.font.family = "'Inter', sans-serif";
            Chart.defaults.color = '#64748b';

            chartInstance = new Chart(ctx, {
                type: 'bar',
                data: {
                    labels: taskLabels,
                    datasets: [{
                        label: 'Persentase',
                        data: percentages,
                        backgroundColor: '#0f172a',
                        borderRadius: 4,
                        maxBarThickness: 50
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false, 
                    scales: {
                        y: {
                            beginAtZero: true,
                            max: 100,
                            grid: { color: '#e2e8f0', drawBorder: false },
                            ticks: { callback: function(value) { return value + "%" } }
                        },
                        x: {
                            grid: { display: false, drawBorder: false }
                        }
                    },
                    plugins: {
                        legend: { display: false },
                        tooltip: {
                            backgroundColor: '#0f172a',
                            callbacks: {
                                label: function(context) {
                                    let taskIdx = context.dataIndex;
                                    let taskName = tasks[taskIdx];
                                    let rawCount = completionCounts[taskName];
                                    return ` ${context.raw}% (${rawCount} dari ${totalDays} hari)`;
                                }
                            }
                        }
                    }
                }
            });
        }

        function exportData() {
            const data = localStorage.getItem('executiveTrackerData');
            const blob = new Blob([data], { type: "application/json" });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `tracker_backup_${getTodayDate()}.json`;
            a.click();
            URL.revokeObjectURL(url);
        }

        function importData(event) {
            const file = event.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = function(e) {
                try {
                    const parsedData = JSON.parse(e.target.result);
                    if (parsedData.startDate && parsedData.history) {
                        localStorage.setItem('executiveTrackerData', JSON.stringify(parsedData));
                        updateUI();
                        alert("Data berhasil disinkronisasi.");
                    } else {
                        alert("Format file tidak valid.");
                    }
                } catch (err) {
                    alert("Gagal membaca file.");
                }
            };
            reader.readAsText(file);
        }

        // Jalankan sinkronisasi jam saat web dibuka
        window.onload = updateUI;
    </script>
</body>
</html>
